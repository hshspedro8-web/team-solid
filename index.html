<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto IA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="side-menu" id="menu">
  <h2>Menu</h2>
  <a onclick="mostrar('home')">Início</a>
  <a onclick="mostrar('rank-musicas')">Rank Músicas</a>
  <a onclick="mostrar('rank-artistas')">Rank Artistas</a>
  <a onclick="mostrar('perfil')">Perfil</a>
</div>

<nav>
  <div>PROJECT 01</div>
</nav>

<!-- HOME -->
<section id="home" class="aba ativa">
  <div class="contador-box">
    <h1 id="contador">Dia 1</h1>
  </div>
  <p>Criando um site com IA.</p>
</section>

<!-- RANK MUSICAS -->
<section id="rank-musicas" class="aba">
  <h2>Ranking de Músicas</h2>
  <ul id="lista-musicas"></ul>
</section>

<!-- RANK ARTISTAS -->
<section id="rank-artistas" class="aba">
  <h2>Ranking de Artistas</h2>
  <input type="text" id="busca" placeholder="Digite um artista...">
  <button onclick="buscarArtista()">Buscar</button>
  <ul id="resultado"></ul>
</section>

<!-- PERFIL -->
<section id="perfil" class="aba">
  <h2>Adicionar Perfil</h2>
  <input type="text" id="nomeUsuario" placeholder="Seu nome">
  <button onclick="adicionarUsuario()">Adicionar</button>
</section>

<script src="script.js"></script>
</body>
</html>
